<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaffSync - Interní Systém</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-24">

    <div id="loginScreen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] px-4 transition-all duration-500">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100 text-center">
            <div class="w-24 h-24 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-8 text-5xl shadow-xl shadow-indigo-200 text-white">💼</div>
            <h1 class="text-4xl font-black text-slate-900 mb-2">StaffSync</h1>
            <p class="text-slate-400 font-medium mb-10">Zadejte heslo pro vstup</p>
            <form id="loginForm" class="space-y-4">
                <input type="password" id="loginPassword" placeholder="••••" required 
                    class="w-full px-6 py-5 border-none bg-slate-100 text-center text-3xl tracking-[0.3em] rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/20 transition-all font-black">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl transition shadow-lg active:scale-95 text-lg">
                    Přihlásit se
                </button>
                <p id="loginError" class="text-sm text-rose-500 hidden font-bold mt-4 italic">Nesprávné přístupové heslo!</p>
            </form>
        </div>
    </div>

    <div id="appContent" class="hidden opacity-0 transition-all duration-700">
        <nav class="glass border-b border-slate-200 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-2xl font-black text-slate-900">Staff<span class="text-indigo-600">Sync</span></span>
                    <span id="roleBadge" class="text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full shadow-sm"></span>
                </div>
                <div class="flex items-center gap-3">
                    <button id="btnReportProblem" class="text-rose-600 bg-rose-50 hover:bg-rose-100 font-black px-5 py-2.5 rounded-2xl transition text-xs flex items-center gap-2">
                        <span>⚠️ NAHLÁSIT</span>
                    </button>
                    <button id="btnToggleStaffModal" class="hidden bg-slate-900 hover:bg-slate-800 text-white font-black px-5 py-2.5 rounded-2xl transition text-xs uppercase tracking-wider">
                        Tým & Správa
                    </button>
                    <button id="btnLogout" class="bg-white border border-slate-200 text-slate-400 hover:text-slate-900 p-2.5 rounded-2xl transition shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 mt-12">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
                <div>
                    <p id="welcomeUser" class="text-indigo-600 font-black text-xs uppercase tracking-[0.3em] mb-2"></p>
                    <h1 id="viewTitle" class="text-5xl font-black text-slate-900 tracking-tight">Dashboard</h1>
                </div>
                <div id="liveClock" class="text-2xl font-black bg-white border-2 border-slate-100 text-slate-900 px-8 py-4 rounded-[2rem] shadow-xl shadow-slate-200/50">00:00:00</div>
            </div>

            <div id="staffGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </main>

        <button id="btnOpenChat" class="fixed bottom-10 right-10 bg-indigo-600 hover:bg-indigo-700 text-white p-6 rounded-[2.5rem] shadow-2xl transition-all z-40 active:scale-90 hover:rotate-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span id="chatBadge" class="absolute -top-1 -right-1 bg-rose-500 text-white font-black text-xs w-7 h-7 rounded-full flex items-center justify-center hidden border-4 border-slate-50">0</span>
        </button>
    </div>

    <div id="staffModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-md hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden border border-white/20">
            <div class="p-10 border-b flex justify-between items-center bg-slate-50/80">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight">Správa týmu</h2>
                <button onclick="closeModal('staffModal')" class="text-slate-300 hover:text-slate-900 text-5xl font-light transition">&times;</button>
            </div>
            
            <div class="p-10 border-b bg-indigo-50/30">
                <p class="text-xs font-black text-indigo-400 uppercase tracking-widest mb-4">Nový zaměstnanec</p>
                <form id="addStaffForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" id="staffTitle" placeholder="Titul (Mgr.)" class="px-5 py-4 bg-white border-none rounded-2xl focus:ring-2 focus:ring-indigo-600 font-bold shadow-sm">
                    <input type="text" id="staffFirstName" placeholder="Jméno" required class="px-5 py-4 bg-white border-none rounded-2xl focus:ring-2 focus:ring-indigo-600 font-bold shadow-sm">
                    <input type="text" id="staffLastName" placeholder="Příjmení" required class="px-5 py-4 bg-white border-none rounded-2xl focus:ring-2 focus:ring-indigo-600 font-bold shadow-sm">
                    <input type="text" id="staffPassword" placeholder="Přihlašovací heslo" required class="px-5 py-4 bg-white border-none rounded-2xl focus:ring-2 focus:ring-indigo-600 font-black shadow-sm text-indigo-600">
                    <button type="submit" class="sm:col-span-2 bg-indigo-600 text-white py-5 rounded-2xl font-black hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                        PŘIDAT DO DATABÁZE
                    </button>
                </form>
            </div>
            
            <div id="staffModalList" class="p-10 overflow-y-auto space-y-4 hide-scrollbar flex-grow"></div>
        </div>
    </div>

    <div id="scheduleModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-md hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-xl max-h-[85vh] flex flex-col overflow-hidden">
            <div class="p-10 border-b flex justify-between items-center bg-slate-50/80">
                <div>
                    <h2 class="text-3xl font-black text-slate-900">Rozvrh</h2>
                    <p id="scheduleModalTarget" class="text-indigo-600 font-black uppercase text-xs tracking-widest mt-1"></p>
                </div>
                <button onclick="closeModal('scheduleModal')" class="text-slate-300 hover:text-slate-900 text-5xl font-light">&times;</button>
            </div>
            <form id="addIntervalForm" class="p-10 border-b space-y-4 bg-amber-50/20">
                <div class="grid grid-cols-2 gap-4">
                    <input type="time" id="intFrom" required class="px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-amber-500 font-bold">
                    <input type="time" id="intTo" required class="px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-amber-500 font-bold">
                </div>
                <div class="flex gap-3">
                    <input type="text" id="intSubject" placeholder="Např. Čeština, Porada..." required class="flex-grow px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-amber-500 font-bold">
                    <button type="submit" class="bg-amber-500 text-white px-8 rounded-2xl font-black hover:bg-amber-600 transition shadow-lg shadow-amber-100">PŘIDAT</button>
                </div>
            </form>
            <div id="intervalsList" class="p-10 overflow-y-auto space-y-3 hide-scrollbar"></div>
        </div>
    </div>

    <div id="chatModal" class="fixed inset-0 bg-slate-900/70 backdrop-blur-md hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-5xl h-[85vh] flex overflow-hidden">
            <div class="w-80 border-r flex flex-col bg-slate-50/50">
                <div class="p-8 border-b flex justify-between items-center bg-white">
                    <h2 class="font-black text-slate-900 text-xl tracking-tight">Zprávy</h2>
                    <button id="btnNewChat" class="bg-indigo-600 text-white w-10 h-10 rounded-xl hover:bg-indigo-700 transition flex items-center justify-center font-bold shadow-lg shadow-indigo-100">💬</button>
                </div>
                <div id="chatThreadsList" class="flex-grow overflow-y-auto p-4 space-y-2 hide-scrollbar"></div>
            </div>
            <div id="chatActiveWindow" class="flex-grow flex flex-col bg-white hidden">
                <div class="p-8 border-b flex justify-between items-center bg-slate-50/30">
                    <h3 id="activeChatPartnerName" class="font-black text-slate-900 text-xl tracking-tight italic">Chat</h3>
                    <button onclick="closeModal('chatModal')" class="text-slate-300 hover:text-slate-900 text-5xl font-light">&times;</button>
                </div>
                <div id="chatMessagesBox" class="flex-grow overflow-y-auto p-10 space-y-6 flex flex-col hide-scrollbar"></div>
                <form id="chatSendForm" class="p-8 border-t flex gap-4">
                    <input type="text" id="chatInputMessage" placeholder="Napište zprávu..." required class="flex-grow px-6 py-5 bg-slate-50 border-none rounded-3xl focus:ring-4 focus:ring-indigo-500/10 font-bold text-slate-700">
                    <button type="submit" class="bg-indigo-600 text-white px-10 rounded-3xl font-black hover:bg-indigo-700 transition shadow-xl shadow-indigo-100">ODESLAT</button>
                </form>
            </div>
            <div id="chatEmptyWindow" class="flex-grow flex flex-col items-center justify-center text-center p-16 bg-white relative">
                <div class="text-8xl mb-8 animate-bounce">📮</div>
                <p class="text-slate-300 font-black text-2xl max-w-xs leading-tight uppercase italic tracking-tighter">Vyberte si parťáka a začněte psát!</p>
                <button onclick="closeModal('chatModal')" class="absolute top-10 right-10 text-slate-300 hover:text-slate-900 text-5xl font-light">&times;</button>
            </div>
        </div>
    </div>

    <div id="newChatModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-[60] p-6">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-10 text-center">
            <h3 class="font-black text-2xl text-slate-900 mb-8">Napsat někomu</h3>
            <select id="newChatUserSelect" class="w-full px-6 py-5 bg-slate-50 border-none rounded-2xl focus:ring-4 focus:ring-indigo-500/10 mb-8 font-black text-slate-700 cursor-pointer"></select>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeModal('newChatModal')" class="px-4 py-4 text-slate-400 font-black hover:bg-slate-50 rounded-2xl transition">ZRUŠIT</button>
                <button id="btnStartChatConfirm" class="px-4 py-4 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 transition shadow-xl">ZAČÍT</button>
            </div>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAudOM7Kr2lJuUTVWwpIZ5OULLwWWX0530",
            authDomain: "skola-a77c6.firebaseapp.com",
            projectId: "skola-a77c6",
            storageBucket: "skola-a77c6.firebasestorage.app",
            messagingSenderId: "946927633510",
            appId: "1:946927633510:web:a288c577047ce78ddd59a7",
            measurementId: "G-JF2PWM4FGZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const staffCollection = collection(db, "zamestnanci");
        const messagesCollection = collection(db, "zpravy");

        let currentUser = null;
        let localStaffData = [];
        let localChatsData = [];
        let activeStaffIdForSchedule = null;
        let activeChatThreadId = null;

        // --- NAČTENÍ DAT ---
        onSnapshot(staffCollection, (snapshot) => {
            localStaffData = [];
            snapshot.forEach(doc => { localStaffData.push({ id: doc.id, ...doc.data() }); });
            if(currentUser) {
                renderMainGrid();
                renderModalStaffList();
                updateSelectUserList();
            }
        });

        // --- PŘIHLAŠOVÁNÍ ---
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');

            if (pass === "6852") {
                currentUser = { id: 'admin', name: 'Administrátor', role: 'admin' };
                initAppUI();
            } else {
                const foundUser = localStaffData.find(u => u.password === pass);
                if (foundUser) {
                    currentUser = { id: foundUser.id, name: `${foundUser.firstName} ${foundUser.lastName}`, role: 'staff', data: foundUser };
                    initAppUI();
                } else {
                    errorEl.classList.remove('hidden');
                }
            }
        });

        function initAppUI() {
            const loginScreen = document.getElementById('loginScreen');
            const appContent = document.getElementById('appContent');
            
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.classList.add('hidden');
                appContent.classList.remove('hidden');
                setTimeout(() => { appContent.style.opacity = '1'; }, 50);
            }, 500);

            const badge = document.getElementById('roleBadge');
            const welcome = document.getElementById('welcomeUser');
            welcome.innerText = `Vítejte, ${currentUser.name}`;

            if (currentUser.role === 'admin') {
                badge.innerText = "ADMINISTRÁTOR";
                badge.classList.add('bg-slate-900', 'text-white');
                document.getElementById('btnToggleStaffModal').classList.remove('hidden');
            } else {
                badge.innerText = "ZAMĚSTNANEC";
                badge.classList.add('bg-indigo-600', 'text-white');
            }

            const qMessages = query(messagesCollection, orderBy("timestamp", "asc"));
            onSnapshot(qMessages, (snapshot) => {
                localChatsData = [];
                snapshot.forEach(doc => { localChatsData.push({ id: doc.id, ...doc.data() }); });
                renderChatThreads();
                if(activeChatThreadId) renderMessages(activeChatThreadId);
                updateChatBadge();
            });

            renderMainGrid();
            updateSelectUserList();
        }

        document.getElementById('btnLogout').addEventListener('click', () => location.reload());

        // --- ČAS & STATUS ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toTimeString().split(' ')[0];
            updateStaffStatuses();
        }, 1000);

        function timeToMinutes(timeStr) {
            if(!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function getCurrentStatus(intervals) {
            if (!intervals || intervals.length === 0) return { text: "VOLNO", active: false };
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            const lesson = intervals.find(i => {
                const s = timeToMinutes(i.from);
                const e = timeToMinutes(i.to);
                return currentMinutes >= s && currentMinutes < e;
            });

            if (lesson) return { text: lesson.subject, active: true };

            const starts = intervals.map(i => timeToMinutes(i.from));
            const ends = intervals.map(i => timeToMinutes(i.to));
            const first = Math.min(...starts);
            const last = Math.max(...ends);

            if (currentMinutes >= first && currentMinutes < last) return { text: "☕ PŘESTÁVKA", active: false, isBreak: true };
            return { text: "PO PRÁCI", active: false };
        }

        // --- DASHBOARD ---
        function renderMainGrid() {
            const grid = document.getElementById('staffGrid');
            let users = currentUser.role === 'staff' ? localStaffData.filter(u => u.id === currentUser.id) : localStaffData;

            grid.innerHTML = users.map(p => {
                const s = getCurrentStatus(p.intervals);
                let sc = "bg-slate-100 text-slate-300";
                if (s.active) sc = "bg-emerald-500 text-white shadow-emerald-200 animate-pulse";
                else if (s.isBreak) sc = "bg-amber-500 text-white shadow-amber-200";

                const sorted = p.intervals ? [...p.intervals].sort((a,b) => timeToMinutes(a.from)-timeToMinutes(b.from)) : [];
                return `
                    <div class="bg-white rounded-[3rem] p-10 shadow-2xl shadow-slate-200/50 border border-slate-100 transition hover:scale-[1.03]">
                        <div class="flex items-center gap-4 mb-8">
                            <div class="w-16 h-16 bg-slate-900 rounded-[1.5rem] flex items-center justify-center text-white font-black text-2xl shadow-lg">
                                ${p.firstName[0]}${p.lastName[0]}
                            </div>
                            <div>
                                <h3 class="text-2xl font-black text-slate-900 leading-none">${p.firstName} ${p.lastName}</h3>
                                <p class="text-indigo-600 text-[10px] font-black uppercase tracking-widest mt-2">${p.title || 'MEMBER'}</p>
                            </div>
                        </div>
                        <div id="status-text-${p.id}" class="text-center font-black py-5 rounded-[1.5rem] ${sc} transition-all shadow-xl mb-10 tracking-widest text-sm">
                            ${s.text.toUpperCase()}
                        </div>
                        <div class="space-y-3">
                            <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] mb-4">Program</p>
                            ${sorted.map(i => `
                                <div class="flex justify-between items-center text-xs font-black bg-slate-50 p-4 rounded-2xl border border-slate-50">
                                    <span class="text-indigo-600">${i.from} - ${i.to}</span>
                                    <span class="text-slate-700">${i.subject}</span>
                                </div>
                            `).join('') || '<p class="text-slate-300 text-xs italic font-bold">Dnes bez programu</p>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStaffStatuses() {
            localStaffData.forEach(p => {
                const el = document.getElementById(`status-text-${p.id}`);
                if (!el) return;
                const s = getCurrentStatus(p.intervals);
                el.innerText = s.text.toUpperCase();
                el.className = "text-center font-black py-5 rounded-[1.5rem] transition-all shadow-xl mb-10 tracking-widest text-sm";
                if (s.active) el.classList.add("bg-emerald-500", "text-white", "animate-pulse");
                else if (s.isBreak) el.classList.add("bg-amber-500", "text-white");
                else el.classList.add("bg-slate-100", "text-slate-300");
            });
        }

        // --- MANAGEMENT (ADMIN) ---
        // OPRAVENÁ FUNKCE PRO UKLÁDÁNÍ
        document.getElementById('addStaffForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("Pokus o vytvoření účtu...");
            
            const title = document.getElementById('staffTitle').value.trim();
            const firstName = document.getElementById('staffFirstName').value.trim();
            const lastName = document.getElementById('staffLastName').value.trim();
            const password = document.getElementById('staffPassword').value.trim();

            try {
                await addDoc(staffCollection, { 
                    title, 
                    firstName, 
                    lastName, 
                    password, 
                    intervals: [] 
                });
                console.log("Účet vytvořen!");
                document.getElementById('addStaffForm').reset();
            } catch (err) {
                console.error("Chyba při vytváření účtu:", err);
                alert("Nepodařilo se vytvořit účet. Zkontrolujte připojení.");
            }
        });

        window.deleteStaff = async (id) => { if(confirm("Trvale smazat?")) await deleteDoc(doc(db, "zamestnanci", id)); };

        window.openScheduleModal = (id) => {
            activeStaffIdForSchedule = id;
            renderIntervalsList();
            document.getElementById('scheduleModal').classList.remove('hidden');
        };

        document.getElementById('addIntervalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = document.getElementById('intFrom').value;
            const t = document.getElementById('intTo').value;
            const s = document.getElementById('intSubject').value.trim();
            const p = localStaffData.find(u => u.id === activeStaffIdForSchedule);
            const upd = [...(p.intervals || []), { from:f, to:t, subject:s }];
            await updateDoc(doc(db, "zamestnanci", activeStaffIdForSchedule), { intervals: upd });
            document.getElementById('addIntervalForm').reset();
            renderIntervalsList();
        });

        window.deleteInterval = async (idx) => {
            const p = localStaffData.find(u => u.id === activeStaffIdForSchedule);
            let ints = [...(p.intervals || [])];
            ints.splice(idx, 1);
            await updateDoc(doc(db, "zamestnanci", activeStaffIdForSchedule), { intervals: ints });
            renderIntervalsList();
        };

        function renderIntervalsList() {
            const p = localStaffData.find(u => u.id === activeStaffIdForSchedule);
            document.getElementById('scheduleModalTarget').innerText = `${p.firstName} ${p.lastName}`;
            const s = [...(p.intervals || [])].sort((a,b)=>timeToMinutes(a.from)-timeToMinutes(b.from));
            document.getElementById('intervalsList').innerHTML = s.map((i, idx) => `
                <div class="flex items-center justify-between bg-slate-50 p-6 rounded-[1.5rem] border border-slate-100">
                    <span class="font-black text-indigo-600">${i.from} - ${i.to} | ${i.subject}</span>
                    <button onclick="deleteInterval(${idx})" class="text-rose-500 font-black text-xs">ODSTRANIT</button>
                </div>
            `).join('');
        }

        function renderModalStaffList() {
            document.getElementById('staffModalList').innerHTML = localStaffData.map(p => `
                <div class="flex items-center justify-between bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <span class="font-black text-lg italic">${p.firstName} ${p.lastName}</span>
                    <div class="flex gap-2">
                        <button onclick="openScheduleModal('${p.id}')" class="bg-amber-500 text-white text-[10px] px-6 py-2.5 rounded-xl font-black transition hover:scale-105">ROZVRH</button>
                        <button onclick="deleteStaff('${p.id}')" class="bg-rose-500 text-white text-[10px] px-6 py-2.5 rounded-xl font-black transition hover:scale-105">SMAZAT</button>
                    </div>
                </div>
            `).join('');
        }

        // --- CHAT ---
        function updateSelectUserList() {
            const sel = document.getElementById('newChatUserSelect');
            let opts = [];
            if(currentUser.role === 'staff') {
                opts.push({id: 'admin', name: '👑 ADMIN'});
                localStaffData.filter(u => u.id !== currentUser.id).forEach(u => opts.push({id: u.id, name: `${u.firstName} ${u.lastName}`}));
            } else {
                localStaffData.forEach(u => opts.push({id: u.id, name: `${u.firstName} ${u.lastName}`}));
            }
            sel.innerHTML = opts.map(o => `<option value="${o.id}">${o.name}</option>`).join('');
        }

        document.getElementById('btnReportProblem').addEventListener('click', async () => {
            const txt = prompt("Co se děje?");
            if(!txt) return;
            await addDoc(messagesCollection, { senderId: currentUser.id, senderName: currentUser.name, receiverId: 'admin', receiverName: 'Administrátor', text: `⚠️ HLÁŠENÍ: ${txt}`, timestamp: Date.now(), readBy: [currentUser.id] });
            alert("Odesláno adminovi.");
        });

        window.openChatThread = async (pid, pname) => {
            activeChatThreadId = pid;
            document.getElementById('chatEmptyWindow').classList.add('hidden');
            document.getElementById('chatActiveWindow').classList.remove('hidden');
            document.getElementById('activeChatPartnerName').innerText = pname;
            renderMessages(pid);

            localChatsData.forEach(async (m) => {
                if(m.senderId === pid && m.receiverId === currentUser.id && (!m.readBy || !m.readBy.includes(currentUser.id))) {
                    await updateDoc(doc(db, "zpravy", m.id), { readBy: [...(m.readBy || []), currentUser.id] });
                }
            });
        };

        function renderMessages(pid) {
            const box = document.getElementById('chatMessagesBox');
            const msgs = localChatsData.filter(m => (m.senderId === currentUser.id && m.receiverId === pid) || (m.senderId === pid && m.receiverId === currentUser.id));
            box.innerHTML = msgs.map(m => {
                const me = m.senderId === currentUser.id;
                return `<div class="max-w-[75%] p-5 rounded-[1.5rem] text-sm font-bold shadow-sm ${me ? 'bg-indigo-600 text-white self-end rounded-br-none' : 'bg-slate-100 text-slate-800 self-start rounded-bl-none'}">
                    <p class="text-[8px] opacity-40 mb-1 uppercase font-black">${m.senderName}</p><p>${m.text}</p>
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        function renderChatThreads() {
            const container = document.getElementById('chatThreadsList');
            const threads = {};
            localChatsData.forEach(m => {
                if(m.senderId === currentUser.id || m.receiverId === currentUser.id) {
                    const pId = m.senderId === currentUser.id ? m.receiverId : m.senderId;
                    const pName = m.senderId === currentUser.id ? m.receiverName : m.senderName;
                    if(!threads[pId] || threads[pId].timestamp < m.timestamp) {
                        threads[pId] = { id: pId, name: pName, text: m.text, timestamp: m.timestamp, unread: (!m.readBy || !m.readBy.includes(currentUser.id)) && m.receiverId === currentUser.id };
                    } else if(m.receiverId === currentUser.id && (!m.readBy || !m.readBy.includes(currentUser.id))) {
                        threads[pId].unread = true;
                    }
                }
            });
            container.innerHTML = Object.values(threads).sort((a,b)=>b.timestamp-a.timestamp).map(t => `
                <div onclick="openChatThread('${t.id}', '${t.name}')" class="p-6 rounded-[1.5rem] border cursor-pointer transition flex items-center justify-between ${activeChatThreadId === t.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 border-indigo-600' : 'bg-white border-transparent hover:bg-slate-200'}">
                    <div class="overflow-hidden"><p class="font-black text-sm truncate uppercase tracking-tighter">${t.name}</p><p class="text-[10px] opacity-60 truncate font-bold italic">${t.text}</p></div>
                    ${t.unread ? '<span class="w-3 h-3 bg-rose-500 rounded-full animate-ping"></span>' : ''}
                </div>
            `).join('');
        }

        document.getElementById('chatSendForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const i = document.getElementById('chatInputMessage');
            if(!i.value.trim() || !activeChatThreadId) return;
            await addDoc(messagesCollection, { senderId: currentUser.id, senderName: currentUser.name, receiverId: activeChatThreadId, receiverName: document.getElementById('activeChatPartnerName').innerText, text: i.value.trim(), timestamp: Date.now(), readBy: [currentUser.id] });
            i.value = '';
        });

        function updateChatBadge() {
            const badge = document.getElementById('chatBadge');
            const unread = new Set(localChatsData.filter(m => m.receiverId === currentUser.id && (!m.readBy || !m.readBy.includes(currentUser.id))).map(m => m.senderId)).size;
            badge.innerText = unread;
            unread > 0 ? badge.classList.remove('hidden') : badge.classList.add('hidden');
        }

        // --- OVLÁDÁNÍ MODÁLŮ ---
        document.getElementById('btnStartChatConfirm').addEventListener('click', () => {
            const sel = document.getElementById('newChatUserSelect');
            closeModal('newChatModal');
            openChatThread(sel.value, sel.options[sel.selectedIndex].text);
        });

        document.getElementById('btnNewChat').addEventListener('click', () => document.getElementById('newChatModal').classList.remove('hidden'));
        document.getElementById('btnOpenChat').addEventListener('click', () => document.getElementById('chatModal').classList.remove('hidden'));
        document.getElementById('btnToggleStaffModal').addEventListener('click', () => document.getElementById('staffModal').classList.remove('hidden'));
        
        window.closeModal = (id) => { 
            document.getElementById(id).classList.add('hidden'); 
            if(id === 'chatModal') activeChatThreadId = null; 
        };
    </script>
</body>
</html>
